<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Left note -->
    <circle cx="-70" cy="60" r="32" fill="white" opacity="0.95"/>
    <rect x="-56" y="-100" width="12" height="160" rx="6" fill="white" opacity="0.95"/>
    <!-- Right note -->
    <circle cx="70" cy="40" r="32" fill="white" opacity="0.95"/>
    <rect x="84" y="-120" width="12" height="160" rx="6" fill="white" opacity="0.95"/>
    <!-- Connecting beam -->
    <rect x="-50" y="-120" width="146" height="14" rx="7" fill="white" opacity="0.95" transform="rotate(-8, -50, -120)"/>
  </g>
</svg>
