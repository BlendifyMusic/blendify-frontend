<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d2e1a"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Headphone band -->
  <path d="M136 280 C136 180, 200 120, 256 120 C312 120, 376 180, 376 280" stroke="#1DB954" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Left ear cup -->
  <rect x="108" y="264" width="44" height="68" rx="22" fill="#1DB954"/>
  <!-- Right ear cup -->
  <rect x="360" y="264" width="44" height="68" rx="22" fill="#1DB954"/>
  <!-- Left circle (green) -->
  <circle cx="216" cy="300" r="72" fill="#1DB954" opacity="0.85"/>
  <!-- Right circle (coral/pink) -->
  <circle cx="296" cy="300" r="72" fill="#fc3c8a" opacity="0.75"/>
  <!-- Overlap blend -->
  <clipPath id="leftClip"><circle cx="216" cy="300" r="72"/></clipPath>
  <circle cx="296" cy="300" r="72" fill="#8de84e" opacity="0.9" clip-path="url(#leftClip)"/>
</svg>
